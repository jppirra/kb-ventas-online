<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mercato</title>

  <!-- Ícono para iOS share sheet y homescreen -->
  <link rel="apple-touch-icon" href="https://mercato.jafpsoft.com/logo-icon.png" />

  <!-- OG tags por defecto — las páginas dinámicas las sobreescriben vía JS -->
  <meta property="og:title" content="Mercato" />
  <meta property="og:description" content="Catálogos digitales con inteligencia artificial" />
  <meta property="og:image" content="https://mercato.jafpsoft.com/logo-icon.png" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Mercato" />
  <script>
    (function() {
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
