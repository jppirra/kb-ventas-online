<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mercato</title>

  <!-- Íconos — iOS busca /apple-touch-icon.png en la raíz automáticamente -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="180x180" href="/apple-touch-icon.png" />

  <!-- OG tags por defecto (JPG sin alpha, 1200x630 — requerido por WhatsApp/redes) -->
  <meta property="og:title" content="Mercato" />
  <meta property="og:description" content="Catálogos digitales con inteligencia artificial" />
  <meta property="og:image" content="https://mercato.jafpsoft.com/og-image.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Mercato" />
  <!-- Twitter card (WhatsApp también lo lee) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://mercato.jafpsoft.com/og-image.jpg" />
  <script>
    (function() {
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
