spring.application.name=ventas-online

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/my_app}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSLMODE:disable}
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:5}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:${SERVER_PORT:8080}}

# ── CORS ──────────────────────────────────────────────────────────────────────
spring.web.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174}

# ── Email (Resend REST API) ───────────────────────────────────────────────────
resend.api-key=${RESEND_API_KEY:}
mail.from.address=${MAIL_FROM_ADDRESS:onboarding@resend.dev}
app.base-url=${APP_BASE_URL:http://localhost:5173}
app.backend-url=${APP_BACKEND_URL:http://localhost:8080}

# ── Google OAuth (optional) ───────────────────────────────────────────────────
google.client-id=${GOOGLE_CLIENT_ID:}

# ── Admin ─────────────────────────────────────────────────────────────────────
app.admin.email=${APP_ADMIN_EMAIL:}
app.admin.emails=${APP_ADMIN_EMAILS:pirrajuanpablo@gmail.com,juanppirra@gmail.com}

# ── Supabase Storage ──────────────────────────────────────────────────────────
supabase.url=${SUPABASE_URL:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.bucket=${SUPABASE_BUCKET:catalog-images}

# ── Gemini AI (proveedor principal) ──────────────────────────────────────────
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash-lite}

# ── OpenRouter AI (fallback gratuito) ────────────────────────────────────────
openrouter.api-key=${OPENROUTER_API_KEY:}
openrouter.model=${OPENROUTER_MODEL:liquid/lfm-2.5-1.2b-instruct:free}
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Mercado Pago OAuth ────────────────────────────────────────────────────────
mp.client-id=${MP_CLIENT_ID:}
mp.client-secret=${MP_CLIENT_SECRET:}
mp.redirect-uri=${MP_REDIRECT_URI:http://localhost:5173/tickets/config}
mp.notification-url=${MP_NOTIFICATION_URL:http://localhost:8080}

# ── Cifrado AES-256-GCM (64 hex chars = 32 bytes) ────────────────────────────
app.encryption-key=${APP_ENCRYPTION_KEY:}

# ── Resilience4j Circuit Breaker mp-api ──────────────────────────────────────
resilience4j.circuitbreaker.instances.mp-api.sliding-window-size=10
resilience4j.circuitbreaker.instances.mp-api.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.mp-api.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.mp-api.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.mp-api.record-exceptions=java.io.IOException,org.springframework.web.client.ResourceAccessException,com.jafpsoft.ventas.exception.MercadoPagoUnavailableException
resilience4j.circuitbreaker.instances.mp-api.ignore-exceptions=com.jafpsoft.ventas.exception.MercadoPagoApiException

# ── Resilience4j Retry mp-api ─────────────────────────────────────────────────
resilience4j.retry.instances.mp-api.max-attempts=3
resilience4j.retry.instances.mp-api.wait-duration=1s
resilience4j.retry.instances.mp-api.retry-exceptions=java.io.IOException,org.springframework.web.client.ResourceAccessException
resilience4j.retry.instances.mp-api.ignore-exceptions=com.jafpsoft.ventas.exception.MercadoPagoApiException

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Version ──────────────────────────────────────────────────────────────────
app.version=1.004.04.2f
