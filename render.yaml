services:
  - type: web
    name: catalogia-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_URL
        value: jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:6543/postgres?sslmode=require
      - key: DB_USERNAME
        value: postgres.acvrnndmfveufjnnvduf
      - key: DB_PASSWORD
        sync: false          # @Tucuman176.
      - key: DB_SSLMODE
        value: require
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 3600000
      - key: JWT_REFRESH_EXPIRATION
        value: 604800000
      - key: APP_BASE_URL
        sync: false          # completar con URL de Vercel después del deploy
      - key: APP_BACKEND_URL
        value: https://catalogia-backend.onrender.com
      - key: CORS_ORIGINS
        sync: false          # completar con URL de Vercel después del deploy
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM_ADDRESS
        value: onboarding@resend.dev
      - key: GOOGLE_CLIENT_ID
        value: 873128842697-b7rvr3eml5ji763srr745qkp3lkj5o3e.apps.googleusercontent.com
      - key: APP_ADMIN_EMAILS
        value: pirrajuanpablo@gmail.com,juanppirra@gmail.com
      - key: SUPABASE_URL
        value: https://acvrnndmfveufjnnvduf.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false          # obtener de Supabase Settings → API → service_role (Reveal)
      - key: SUPABASE_BUCKET
        value: catalog-images
      - key: ANTHROPIC_API_KEY
        sync: false
